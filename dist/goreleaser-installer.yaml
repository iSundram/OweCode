version: 2

project_name: installer

before:
  hooks:
    - go mod tidy

builds:
  - id: installer
    main: ./cmd/installer
    binary: installer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/iSundram/OweCode/internal/installer.Version={{ .Env.INSTALLER_VERSION }} -X github.com/iSundram/OweCode/internal/installer.Commit={{.Commit}} -X github.com/iSundram/OweCode/internal/installer.BuildDate={{.Date}}

archives:
  - id: installer-archive
    builds:
      - installer
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "installer_{{ .Tag | replace \"installer/\" \"\" }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - VERSION_INSTALLER

checksum:
  name_template: "checksums_installer.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "merge"

release:
  github:
    owner: iSundram
    name: OweCode
  name_template: "{{.Tag}}"
  draft: false
  prerelease: auto
  header: |
    ## ✧ OweCode TUI Installer {{.Tag}}
    
    To install OweCode using this installer, run:
    ```bash
    curl -sSL https://raw.githubusercontent.com/iSundram/OweCode/main/install.sh | sh
    ```
