name: release

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'
      - 'VERSION_INSTALLER'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Determine what to release
        id: check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^VERSION$"; then
            echo "agent_changed=true" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only HEAD^ HEAD | grep -q "^VERSION_INSTALLER$"; then
            echo "installer_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release OweCode Agent
        if: steps.check.outputs.agent_changed == 'true'
        run: |
          VER=$(cat VERSION)
          TAG="v$VER"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            
            OWECODE_VERSION=$VER \
            goreleaser release --clean -f dist/goreleaser-owecode.yaml
          else
            echo "Tag $TAG already exists, skipping agent release."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release OweCode TUI Installer
        if: steps.check.outputs.installer_changed == 'true'
        run: |
          VER=$(cat VERSION_INSTALLER)
          TAG="installer/v$VER"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            
            INSTALLER_VERSION=$VER \
            goreleaser release --clean -f dist/goreleaser-installer.yaml
          else
            echo "Tag $TAG already exists, skipping installer release."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
